# sandbox/rstudio-sandbox.yml
# Production-equivalent RStudio fixture for a separate host (e.g. 192.168.56.40 in Vagrant)
# Uses OIDC sidecar proxy, Socket Proxy, and strict resource limits.
---

services:
  # --- 1. Docker Socket Proxy for Telemetry ---
  # Pessimistic Isolation: Never mount /var/run/docker.sock directly into telemetry.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: rstudio_socket_proxy
    restart: unless-stopped
    network_mode: "host"
    environment:
      - CONTAINERS=1   # Allow read-only access to containers API
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # --- 2a. RStudio Service (SSSD Profile) ---
  rstudio-sssd:
    profiles: [ "sssd" ]
    build:
      context: ../infra-rstudio
      dockerfile: Dockerfile.sssd
    image: ${RSTUDIO_SSSD_IMAGE:-rstudio-botanical-sssd:v1.0.0}
    container_name: rstudio_pet
    restart: unless-stopped
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${RSTUDIO_MEMORY_LIMIT:-8G}
          cpus: ${RSTUDIO_CPU_LIMIT:-2.0}
    cap_drop:
      - SYS_CHROOT
    tmpfs:
      - /tmp:rw,size=${RAMDISK_SIZE:-4G},uid=0,gid=0,mode=1777
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -s http://127.0.0.1:8787/auth-sign-in || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - AUTH_BACKEND=sssd
      - USERID=${DOCKER_USERID:-1000}
      - GROUPID=${DOCKER_GROUPID:-1000}
    volumes:
      - ../infra-rstudio/config:/etc/rstudio/config:ro
      - ${STEP_CA_ROOT_PATH:-../infra-rstudio/shared-certs/step-ca-root.crt}:/usr/local/share/ca-certificates/step-ca-root.crt:ro
    depends_on:
      - docker-socket-proxy

  # --- 2b. RStudio Service (Samba Profile) ---
  rstudio-samba:
    profiles: [ "samba" ]
    build:
      context: ../infra-rstudio
      dockerfile: Dockerfile.samba
    image: ${RSTUDIO_SAMBA_IMAGE:-rstudio-botanical-samba:v1.0.0}
    container_name: rstudio_pet
    restart: unless-stopped
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${RSTUDIO_MEMORY_LIMIT:-8G}
          cpus: ${RSTUDIO_CPU_LIMIT:-2.0}
    cap_drop:
      - SYS_CHROOT
    tmpfs:
      - /tmp:rw,size=${RAMDISK_SIZE:-4G},uid=0,gid=0,mode=1777
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -s http://127.0.0.1:8787/auth-sign-in || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - AUTH_BACKEND=samba
      - USERID=${DOCKER_USERID:-1000}
      - GROUPID=${DOCKER_GROUPID:-1000}
    volumes:
      - ../infra-rstudio/config:/etc/rstudio/config:ro
      - ${STEP_CA_ROOT_PATH:-../infra-rstudio/shared-certs/step-ca-root.crt}:/usr/local/share/ca-certificates/step-ca-root.crt:ro
    depends_on:
      - docker-socket-proxy


  # --- 3. Telemetry & Metrics API ---
  telemetry-api:
    build:
      context: ../infra-rstudio
      dockerfile: Dockerfile.telemetry
    image: botanical-telemetry-api:v1.0.0
    container_name: telemetry_api
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    volumes:
      - /:/hostfs:ro
      - /var/run:/var/run:ro
      # Removed raw sock mount. Will point to the proxy via DOCKER_HOST.
    environment:
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - NFS_HOME=/hostfs/nfs/home
      - PROJECTS_DIR=/hostfs/nfs/projects
      - TMP_DIR=/hostfs/tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -s http://127.0.0.1:8000/api/v1/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - docker-socket-proxy

  # --- 4. OAuth2-Proxy Sidecar (OIDC Zero-Trust Auth) ---
  # Replaces optimistic SSSD UI login, integrating with Keycloak
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: rstudio_oauth2_proxy
    restart: unless-stopped
    command:
      - --config=/etc/oauth2-proxy.cfg
    volumes:
      - ../infra-rstudio/config/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
    network_mode: "host"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
