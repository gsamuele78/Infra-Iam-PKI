<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Sandbox OOD Test</title>
    <link rel="stylesheet" href="bigea-theme.css">
    <style>
        body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .test-box { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 2rem; border-radius: 10px; color: white; text-align: center; }
        img { max-width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body class="ood-body">
    <div class="test-box">
        <img src="img/Bigea.png" alt="BiGeA Logo">
        <h1>Open OnDemand Theme Sandbox</h1>
        <p>If you see a dark glassmorphism layout with the BiGeA logo, the CSS is loaded properly without external CDNs!</p>
    </div>
</body>
</html>
