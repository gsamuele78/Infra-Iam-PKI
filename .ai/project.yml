  network: "192.168.56.0/24"
  hosts:
    - name: "pki-host"
      ip: "192.168.56.10"
      ram: 2048
      cpus: 2
      compose: "infra-pki/docker-compose.yml"
      note: "Uses PRODUCTION compose directly — no sandbox override"
    - name: "iam-host"
      ip: "192.168.56.20"
      ram: 2048
      cpus: 2
      compose: "sandbox/iam-sandbox.yml"
      note: "Sandbox override: KC start-dev, no renewer, simple Caddy"
    - name: "ood-host"
      ip: "192.168.56.30"
      ram: 4096
      cpus: 4
      compose: "sandbox/ood-sandbox.yml"
      note: "Builds real Dockerfile.ood — first build ~15min"
    - name: "rstudio-host"
      ip: "192.168.56.40"
      ram: 4096
      cpus: 4
      compose: "sandbox/rstudio-sandbox.yml"
      note: "Tests RStudio SSO E2E flow with oauth2-proxy integration"