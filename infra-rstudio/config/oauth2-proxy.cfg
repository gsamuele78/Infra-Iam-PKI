# infra-rstudio/config/oauth2-proxy.cfg
# Zero-Trust OIDC configuration delegating to Keycloak

provider = "oidc"
client_id = "rstudio"
client_secret = "sandbox_rstudio_secret"
oidc_issuer_url = "http://192.168.56.20/realms/master"
cookie_secret = "OQdlV1N1VndmS2tDcjZpMUZYS1R2bXZ5ZHk="
cookie_secure = true
email_domains = [ "*" ]
upstreams = [ "http://127.0.0.1:8787" ]
# In proxy mode we just return 202 Auth OK if valid
# But actually Nginx `auth_request` just checks the status.
# However, if we want oauth2-proxy to act as a pure reverse proxy for RStudio:
# (But nginx is already doing it... wait)
# If Nginx uses auth_request, we need:
# upstreams = [ "file:///dev/null" ]
# But if we use it as a sidecar proxy validating tokens, maybe it passes through.
# For standard Nginx integration:
http_address = "127.0.0.1:4180"

# Redirect URI matches Nginx configuration
redirect_url = "https://192.168.56.40:8443/oauth2/callback"

# Skip provider button page
skip_provider_button = true
