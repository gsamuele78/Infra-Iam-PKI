apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-sa
  namespace: botanical

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telemetry-metrics-reader
rules:
  # Allow reading node and pod metrics natively instead of mounting host-level sockets
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telemetry-metrics-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: telemetry-metrics-reader
subjects:
  - kind: ServiceAccount
    name: telemetry-sa
    namespace: botanical

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-api
  namespace: botanical
  labels:
    app: telemetry-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-api
  template:
    metadata:
      labels:
        app: telemetry-api
    spec:
      serviceAccountName: telemetry-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
        # --- OAuth2 Proxy Sidecar (Zero-Trust Auth) ---
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=oidc
            - --email-domain=*
            - --upstream=http://127.0.0.1:8000
            - --http-address=0.0.0.0:4180
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rstudio-secrets
                  key: OIDC_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rstudio-secrets
                  key: OIDC_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: rstudio-secrets
                  key: OAUTH2_COOKIE_SECRET
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: rstudio-config
                  key: OIDC_ISSUER_URL
          ports:
            - containerPort: 4180
              name: proxy-http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]

        # --- Main Telemetry API ---
        - name: telemetry-api
          image: ghcr.io/unibo/r-studioconf/botanical-telemetry-api:v1.0.0
          envFrom:
            - configMapRef:
                name: rstudio-config
          env:
            - name: USE_K8S_METRICS
              value: "true" # Flag telling the rewritten script to use the K8s API
            - name: NFS_HOME
              valueFrom:
                configMapKeyRef:
                  name: rstudio-config
                  key: TELEMETRY_NFS_HOME
            - name: PROJECTS_DIR
              valueFrom:
                configMapKeyRef:
                  name: rstudio-config
                  key: TELEMETRY_PROJECTS_DIR
            - name: TMP_DIR
              valueFrom:
                configMapKeyRef:
                  name: rstudio-config
                  key: TELEMETRY_TMP_DIR
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            # Mount just specific directories to monitor disk space usage, NOT the entire host OS
            - name: projects-storage
              mountPath: /nfs/projects
              readOnly: true
            - name: home-storage
              mountPath: /nfs/home
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: projects-storage
          persistentVolumeClaim:
            claimName: rstudio-projects-pvc
        - name: home-storage
          persistentVolumeClaim:
            claimName: rstudio-home-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-api
  namespace: botanical
spec:
  selector:
    app: telemetry-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 4180
  type: ClusterIP
