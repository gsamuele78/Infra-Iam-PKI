apiVersion: v1
kind: ConfigMap
metadata:
  name: ood-config
  namespace: ood
data:
  ood_portal.yml: |
    # Open OnDemand Configuration for BiGeA / R-studioConf Integration
    ---
    auth:
      - 'AuthType openidc'
      - 'Require valid-user'

    oidc_uri: '/oidc'
    oidc_provider_metadata_url: 'https://sso.bigea.unibo.it/realms/master/.well-known/openid-configuration'
    oidc_client_id: 'ood-portal'
    # Wait for Secrets management integration for production
    oidc_client_secret: 'secure_oidc_secret'
    oidc_remote_user_claim: 'preferred_username'
    oidc_scope: 'openid profile email'

    custom_css_files:
      - '/public/bigea-theme.css'

    dashboard_title: 'Servizi Informatici - Dipartimento BiGeA'
    logo: '/public/unibo_logo.png'

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ood-bigea-theme
  namespace: ood
data:
  bigea-theme.css: |
    /* BiGeA Department Custom Tailwind/CSS overrides for Open OnDemand */
    /* Removed external CDN for Airgap security */

    :root {
      --unibo-red: #C80E0F;
      --unibo-red-dark: #9A0B0B;
      --bg-gradient-start: #111827;
      --bg-gradient-end: #3a0808;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif !important;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)) !important;
      background-attachment: fixed !important;
      color: #F3F4F6 !important;
    }

    /* Glassmorphism Navbar */
    .navbar-inverse, .navbar-default {
      background-color: rgba(255, 255, 255, 0.05) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    
    .navbar-brand { color: white !important; font-weight: 700; }
    .navbar-brand::after { content: " Dipartimento BiGeA"; color: #cbd5e1; font-weight: 400; }

    /* Interactive Apps Cards */
    .card, .panel {
      background-color: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 1rem !important;
      color: white !important;
    }

    /* Primary Buttons */
    .btn-primary {
      background-color: var(--unibo-red) !important;
      border-color: var(--unibo-red) !important;
      border-radius: 0.75rem !important;
    }
