apiVersion: v1
kind: Secret
metadata:
  name: pki-secrets
  namespace: pki
type: Opaque
stringData:
  # In a real environment, use ExternalSecretsOperator or SealedSecrets
  DB_PASSWORD: "secure_pki_db_password"
  CA_PASSWORD: "secure_ca_password"
  CA_PROVISIONER_PASSWORD: "secure_provisioner_password"
  OIDC_CLIENT_SECRET: "secure_oidc_secret"
